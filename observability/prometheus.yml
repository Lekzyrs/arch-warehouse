# prometheus scrape config для archfinal стека.
# все таргеты используют compose-DNS имена сервисов (P13).
# три app-сервиса экспонируют метрики на /actuator/prometheus,
# rabbitmq - на /metrics (плагин rabbitmq_prometheus, порт 15692).
# forward reference alert_rules.yml - правила и volume mount появятся в 06-04.
global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "product-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["product-service:8080"]

  - job_name: "stock-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["stock-service:8081"]

  - job_name: "notification-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8082"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
