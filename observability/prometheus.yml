# Phase 1 stub — minimal valid Prometheus config so the container starts
# without a parse error (Assumption A2). Phase 6 fills in real scrape rules.
# Targets use Docker-network DNS (container name + container port): Prometheus
# scrapes inside the compose network. stock-service container port is 8080
# (host 8081) — scrape the container port here.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "product-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["product-service:8080"]

  - job_name: "stock-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["stock-service:8080"]

  - job_name: "notification-service"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["notification-service:8082"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
